<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Belt</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Libre+Franklin:wght@300;400;600&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Fire & Heat Colors */
            --flame-orange: #FF6B35;
            --amber: #F7931E;
            --sunset-red: #C1121F;
            --warm-yellow: #FDB750;
            --deep-orange: #E85D04;
            --cream: #FFF8F0;
            --charcoal: #2B2D42;
            --burgundy: #780000;
            
            /* Moonstruck Colors */
            --moonlight: #E8F0F2;
            --midnight-blue: #1B2845;
            --lavender: #B8A9C9;
            --silver: #C0C0C0;
        }

        .banner-bottom {
    position: absolute;
    bottom: 8%;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    z-index: 1;
}

      body {
    font-family: 'Libre Franklin', sans-serif;
    background: url('bgtheheat.jpg') center/cover no-repeat fixed;
    background-color: var(--charcoal); /* fallback */
    min-height: 100vh;
    color: var(--cream);
    overflow-x: hidden;
    position: relative;
}

        /* Film Grain Overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="5" numOctaves="12"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%" height="100%" filter="url(%23grain)" opacity="0.5"/></svg>');
            pointer-events: none;
            z-index: 9999;
            opacity: 0.6;
            mix-blend-mode: soft-light;
        }

        /* Atmospheric Light Overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
  background: 
    radial-gradient(ellipse at center, 
        rgba(40, 15, 5, 0.05) 0%, 
        rgba(20, 8, 3, 0.3) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* Logo */
        .logo {
            position: fixed;
            top: 2.5rem;
            left: 3rem;
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            color: var(--cream);
            text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
            z-index: 100;
            transition: all 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
            text-shadow: 2px 2px 12px rgba(255,107,53,0.6);
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 3rem;
            right: 3rem;
            z-index: 100;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
        }

        .menu-toggle span {
            display: block;
            width: 28px;
            height: 3px;
            background: var(--cream);
            margin: 5px 0;
            transition: all 0.3s ease;
            box-shadow: 1px 1px 4px rgba(0,0,0,0.5);
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--cream);
            text-decoration: none;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            position: relative;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--warm-yellow);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--warm-yellow);
            transform: translateY(-2px);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Main Container */
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        /* Release Section */
        .release-hero {
            text-align: center;
            max-width: 900px;
            animation: fadeInUp 1.2s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Release Logo/Banner */
        .release-logo {
            margin-bottom: 3rem;
            position: relative;
        }

        .release-banner {
            width: 100%;
            max-width: 700px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7);
            transition: transform 0.3s ease;
        }

        .release-banner:hover {
            transform: scale(1.02);
        }

        /* Since we don't have the actual banner image yet, let's create a styled placeholder */
    .release-banner-placeholder {
    width: 100vw;
    margin-left: calc(50% - 50vw); /* break out of the container */
    aspect-ratio: 21/9;
 background: 
    linear-gradient(180deg, 
        rgba(0,0,0,0.05) 0%, 
        rgba(0,0,0,0.25) 100%),
    url('theheatbg.jpeg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
        mask-image: linear-gradient(to bottom, 
    transparent 0%, 
    black 5%, 
    black 95%, 
    transparent 100%);
-webkit-mask-image: linear-gradient(to bottom, 
    transparent 0%, 
    black 5%, 
    black 95%, 
    transparent 100%);
    filter: contrast(1.05) brightness(1.25);
    mix-blend-mode: luminosity;
    flex-direction: column;
    /* drop the border-radius and box-shadow for an edge-to-edge film-still feel */
}

   .release-banner-placeholder:hover {
   filter: contrast(1.1) brightness(1.35);
}

.release-banner-placeholder:hover {
    filter: sepia(0.35) saturate(1.3) hue-rotate(-10deg) brightness(1.1);
}


        .release-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 7rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            color: var(--cream);
            text-shadow: 4px 4px 12px rgba(0,0,0,0.8);
            position: relative;
            z-index: 1;
        }

        /* Release Type Label */
       .release-type {
    font-size: 1.2rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--warm-yellow);
    font-weight: 300;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
    position: relative;
    z-index: 1;
    animation: fadeInUp 1.2s ease-out 0.2s backwards;
}

        /* CTA Button */
        .cta-button {
            display: inline-block;
            padding: 1.2rem 4rem;
            font-size: 1rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-decoration: none;
            background: var(--cream);
            color: var(--sunset-red);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            animation: fadeInUp 1.2s ease-out 0.4s backwards;
            position: relative;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: var(--warm-yellow);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
            z-index: -1;
        }

        .cta-button:hover::before {
            width: 300px;
            height: 300px;
        }

        .cta-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            color: var(--charcoal);
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .logo {
                top: 2rem;
                left: 2rem;
                font-size: 1.6rem;
            }

            nav {
                top: 2rem;
                right: 2rem;
            }

            .nav-links {
                gap: 1.5rem;
            }

            .release-title {
                font-size: 5rem;
            }
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 1.4rem;
                top: 1.5rem;
                left: 1.5rem;
            }

            nav {
                top: 1.5rem;
                right: 1.5rem;
            }

            .menu-toggle {
                display: block;
            }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                height: 100vh;
                width: 70%;
                max-width: 300px;
                background: rgba(43, 45, 66, 0.98);
                flex-direction: column;
                gap: 2rem;
                padding: 6rem 2rem 2rem 2rem;
                transition: right 0.4s ease;
                box-shadow: -5px 0 20px rgba(0,0,0,0.5);
            }

            .nav-links.active {
                right: 0;
            }

            .nav-links a {
                font-size: 1rem;
            }

            .release-title {
                font-size: 3.5rem;
            }

            .release-type {
                font-size: 1rem;
            }

            .cta-button {
                padding: 1rem 2.5rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .release-title {
                font-size: 2.5rem;
                letter-spacing: 0.15em;
            }

            .release-banner-placeholder {
                aspect-ratio: 4/3;
            }
        }
    </style>
</head>
<body>
    <!-- Logo -->
    <div class="logo">ANNA BELT</div>

    <!-- Navigation -->
    <nav>
        <button class="menu-toggle" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links">
            <li><a href="about.html">About</a></li>
            <li><a href="releases.html">Releases</a></li>
            <li><a href="appearances.html">Appearances</a></li>
            <li><a href="create.html">Create</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="shows.html">Shows</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <div class="release-hero">
            <!-- Release Logo/Banner -->
            <div class="release-logo">
                <!-- Placeholder for actual banner image -->
                <!-- Replace this div with: <img src="the-heat-banner.png" alt="The Heat" class="release-banner"> -->
             <div class="release-banner-placeholder">
    <h1 class="release-title">THE HEAT</h1>
    <div class="banner-bottom">
        <p class="release-type">New EP — Out Now</p>
        <a href="https://linktr.ee/annabelt" class="cta-button" target="_blank">Listen Now</a>
    </div>
</div>


    </div>

    <script>
        // Mobile Menu Toggle
        const menuToggle = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // Close menu when clicking a link
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('nav')) {
                navLinks.classList.remove('active');
            }
        });

        // Smooth scroll behavior
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
    </script>
</body>
</html>
