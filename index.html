<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Belt</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Libre+Franklin:wght@300;400;600&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --flame-orange: #FF6B35;
            --amber: #F7931E;
            --sunset-red: #C1121F;
            --warm-yellow: #FDB750;
            --deep-orange: #E85D04;
            --cream: #FFF8F0;
            --charcoal: #2B2D42;
            --burgundy: #780000;
            --moonlight: #E8F0F2;
            --midnight-blue: #1B2845;
            --lavender: #B8A9C9;
            --silver: #C0C0C0;
        }

        body {
            font-family: 'Libre Franklin', sans-serif;
            background: url('bgtheheat.jpg') center/cover no-repeat fixed;
            background-color: var(--charcoal);
            min-height: 100vh;
            color: var(--cream);
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="5" numOctaves="12"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%" height="100%" filter="url(%23grain)" opacity="0.5"/></svg>');
            pointer-events: none;
            z-index: 9999;
            opacity: 0.6;
            mix-blend-mode: soft-light;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at center,
                    rgba(40, 15, 5, 0.05) 0%,
                    rgba(20, 8, 3, 0.3) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* Logo */
        .logo {
            position: fixed;
            top: 2.5rem;
            left: 3rem;
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            color: var(--cream);
            text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
            z-index: 100;
            transition: all 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
            text-shadow: 2px 2px 12px rgba(255,107,53,0.6);
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 3rem;
            right: 3rem;
            z-index: 100;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
        }

        .menu-toggle span {
            display: block;
            width: 28px;
            height: 3px;
            background: var(--cream);
            margin: 5px 0;
            transition: all 0.3s ease;
            box-shadow: 1px 1px 4px rgba(0,0,0,0.5);
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--cream);
            text-decoration: none;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            position: relative;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--warm-yellow);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--warm-yellow);
            transform: translateY(-2px);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Top Spacer */
        .top-spacer {
            height: 7rem;
            position: relative;
            z-index: 10;
        }

        /* ===== Magazine Section ===== */
        .magazine-section {
            min-height: auto;
            padding: 3rem 0 1.5rem;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg,
                rgba(15, 8, 3, 0.85) 0%,
                rgba(30, 15, 5, 0.92) 50%,
                rgba(15, 8, 3, 0.85) 100%);
            box-shadow:
                inset 0 30px 60px rgba(0,0,0,0.4),
                inset 0 -30px 60px rgba(0,0,0,0.4);
        }

        .magazine-header {
            text-align: center;
         margin-bottom: 1.5rem;
            padding: 0 2rem;
        }

        .magazine-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 7vw, 5rem);
            font-weight: 300;
            letter-spacing: 0.05em;
            color: var(--cream);
            text-shadow: 2px 2px 12px rgba(0,0,0,0.5);
            margin-bottom: 0.25rem;
        }

        .magazine-subtitle {
            font-style: italic;
            color: var(--cream);
            opacity: 0.7;
        }

        .issue-label {
            font-size: 0.85rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--warm-yellow);
            text-align: center;
            margin-bottom: 1.5rem;
            transition: opacity 0.3s ease;
            position: relative;
            z-index: 11;
        }

        .magazine-pages {
            display: flex;
            gap: 2rem;
            width: 100%;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 2rem max(2rem, calc(50vw - 350px)) 3rem;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 248, 240, 0.3) transparent;
        }

        .magazine-pages::-webkit-scrollbar {
            height: 8px;
        }
        .magazine-pages::-webkit-scrollbar-track {
            background: transparent;
        }
        .magazine-pages::-webkit-scrollbar-thumb {
            background: rgba(255, 248, 240, 0.3);
            border-radius: 4px;
        }

        .magazine-page {
            flex: 0 0 auto;
            height: 38vh;
            width: auto;
            max-width: 90vw;
            border-radius: 4px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            transition: transform 0.4s ease, box-shadow 0.4s ease, height 0.4s ease;
            scroll-snap-align: center;
            display: block;
        }

        .magazine-page:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
        }

    

        .magazine-nav {
            position: absolute;
            top: 60%;
            transform: translateY(-50%);
            background: rgba(255, 248, 240, 0.15);
            border: 1px solid rgba(255, 248, 240, 0.3);
            color: var(--cream);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.4rem;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 11;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .magazine-nav:hover {
            background: rgba(255, 248, 240, 0.3);
            transform: translateY(-50%) scale(1.1);
            border-color: var(--warm-yellow);
            color: var(--warm-yellow);
        }

        .magazine-nav.prev { left: 2rem; }
        .magazine-nav.next { right: 2rem; }

        .scroll-hint-text {
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--cream);
            opacity: 0.5;
            margin-top: 1rem;
        }

        /* Divider between magazine + heat */
       .section-divider {
    text-align: center;
    padding: 3rem 2rem 1rem;
    margin-top: 2rem;
    position: relative;
    z-index: 10;
    margin-top: -1rem;
}

.scroll-arrow {
    font-size: 2rem;
    color: var(--warm-yellow);
    margin-top: 0.5rem;
    text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    animation: scrollBounce 2s ease-in-out infinite;
}

@keyframes scrollBounce {
    0%, 100% {
        transform: translateY(0);
        opacity: 0.7;
    }
    50% {
        transform: translateY(8px);
        opacity: 1;
    }
}
        
.section-divider p {
    font-size: 0.85rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--cream);
    text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    opacity: 0.9;
}

        /* Main Container */
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .release-hero {
            text-align: center;
            max-width: 900px;
            animation: fadeInUp 1.2s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .release-logo {
            margin-bottom: 3rem;
            position: relative;
        }

        .release-banner-placeholder {
            width: 100vw;
            margin-left: calc(50% - 50vw);
            aspect-ratio: 21/9;
            background:
                linear-gradient(180deg,
                    rgba(0,0,0,0.05) 0%,
                    rgba(0,0,0,0.25) 100%),
                url('theheatbg.jpeg') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            mask-image: linear-gradient(to bottom,
                transparent 0%,
                black 5%,
                black 95%,
                transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom,
                transparent 0%,
                black 5%,
                black 95%,
                transparent 100%);
            filter: contrast(1.05) brightness(1.25);
            mix-blend-mode: luminosity;
            transition: filter 0.3s ease;
        }

        .release-banner-placeholder:hover {
            filter: contrast(1.1) brightness(1.35);
        }

        .release-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 7rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            color: var(--cream);
            text-shadow: 4px 4px 12px rgba(0,0,0,0.8);
            position: relative;
            z-index: 1;
        }

        .banner-bottom {
            position: absolute;
            bottom: 15%;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            z-index: 1;
        }

        .release-type {
            font-size: 1.2rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--warm-yellow);
            font-weight: 300;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
            animation: fadeInUp 1.2s ease-out 0.2s backwards;
        }

        .cta-button {
            display: inline-block;
            padding: 1.2rem 4rem;
            font-size: 1rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-decoration: none;
            background: var(--cream);
            color: var(--sunset-red);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            animation: fadeInUp 1.2s ease-out 0.4s backwards;
            position: relative;
            overflow: hidden;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: var(--warm-yellow);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
            z-index: -1;
        }

        .cta-button:hover::before {
            width: 300px;
            height: 300px;
        }

        .cta-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            color: var(--charcoal);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .logo { top: 2rem; left: 2rem; font-size: 1.6rem; }
            nav { top: 2rem; right: 2rem; }
            .nav-links { gap: 1.5rem; }
            .release-title { font-size: 5rem; }
        }

        @media (max-width: 768px) {
            .logo { font-size: 1.4rem; top: 1.5rem; left: 1.5rem; }
            nav { top: 1.5rem; right: 1.5rem; }
            .menu-toggle { display: block; }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                height: 100vh;
                width: 70%;
                max-width: 300px;
                background: rgba(43, 45, 66, 0.98);
                flex-direction: column;
                gap: 2rem;
                padding: 6rem 2rem 2rem 2rem;
                transition: right 0.4s ease;
                box-shadow: -5px 0 20px rgba(0,0,0,0.5);
            }

            .nav-links.active { right: 0; }
            .nav-links a { font-size: 1rem; }
            .release-title { font-size: 3.5rem; }
            .release-type { font-size: 1rem; }
            .cta-button { padding: 1rem 2.5rem; font-size: 0.9rem; }

            .magazine-pages { padding: 1rem 5vw 2rem; }
            .magazine-page { width: 90vw; }
            .magazine-nav { display: none; }
        }

        @media (max-width: 480px) {
            .release-title { font-size: 2.5rem; letter-spacing: 0.15em; }
            .release-banner-placeholder { aspect-ratio: 4/3; }
        }
    </style>
</head>
<body>
    <!-- Logo -->
    <div class="logo">ANNA BELT</div>

    <!-- Navigation -->
    <nav>
        <button class="menu-toggle" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links">
            <li><a href="about.html">About</a></li>
            <li><a href="releases.html">Releases</a></li>
            <li><a href="appearances.html">Appearances</a></li>
            <li><a href="create.html">Create</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="shows.html">Shows</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="top-spacer"></div>

    <!-- Magazine Section -->
    <section class="magazine-section">
        <div class="magazine-header">
            <h2 class="magazine-title">Anna on the Page</h2>
            <p class="magazine-subtitle">A monthly zine</p>
        </div>

        <p class="issue-label" id="issueLabel">Issue 01 · May 2026</p>

        <div class="magazine-pages">
            <img src="zine1.png" alt="Anna on the Page — page 1" class="magazine-page"
                 data-issue="Issue 01 · May 2026">
            <img src="zine2.png" alt="Anna on the Page — page 2" class="magazine-page" loading="lazy"
                 data-issue="Issue 01 · May 2026">
        </div>

        <p class="scroll-hint-text">← Swipe to flip pages →</p>

        <button class="magazine-nav prev" aria-label="Previous page">←</button>
        <button class="magazine-nav next" aria-label="Next page">→</button>
    </section>

    <!-- Divider -->
    <div class="section-divider">
        <p>Now Releasing</p>
<div class="scroll-arrow">↓</div>
    </div>

    <!-- The Heat Banner -->
    <div class="container">
        <div class="release-hero">
            <div class="release-logo">
                <div class="release-banner-placeholder">
                    <h1 class="release-title">THE HEAT</h1>
                    <div class="banner-bottom">
                        <p class="release-type">New EP — Out Now</p>
                        <a href="https://linktr.ee/annabelt" class="cta-button" target="_blank">Listen Now</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const menuToggle = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('nav')) {
                navLinks.classList.remove('active');
            }
        });

        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });

      const magazinePages = document.querySelector('.magazine-pages');
const prevBtn = document.querySelector('.magazine-nav.prev');
const nextBtn = document.querySelector('.magazine-nav.next');
const issueLabel = document.getElementById('issueLabel');

// Clone pages for infinite-loop effect
function setupInfiniteCarousel() {
    if (!magazinePages) return;
    const originals = Array.from(magazinePages.querySelectorAll('.magazine-page'));
    if (originals.length === 0) return;

    // Append two more sets of clones so we have 3 total sets
    for (let i = 0; i < 2; i++) {
        originals.forEach(page => {
            const clone = page.cloneNode(true);
            clone.setAttribute('aria-hidden', 'true');
            magazinePages.appendChild(clone);
        });
    }

    // Start in the middle set so the user can scroll either direction
    requestAnimationFrame(() => {
        const setWidth = magazinePages.scrollWidth / 3;
        magazinePages.scrollLeft = setWidth;
    });
}

let isJumping = false;
function handleInfiniteScroll() {
    if (!magazinePages || isJumping) return;
    const setWidth = magazinePages.scrollWidth / 3;
    const scroll = magazinePages.scrollLeft;

    // If user reaches the first or third set, silently jump to the equivalent middle position
    if (scroll < setWidth * 0.5) {
        isJumping = true;
        magazinePages.style.scrollBehavior = 'auto';
        magazinePages.scrollLeft = scroll + setWidth;
        magazinePages.style.scrollBehavior = '';
        setTimeout(() => { isJumping = false; }, 50);
    } else if (scroll > setWidth * 2.5) {
        isJumping = true;
        magazinePages.style.scrollBehavior = 'auto';
        magazinePages.scrollLeft = scroll - setWidth;
        magazinePages.style.scrollBehavior = '';
        setTimeout(() => { isJumping = false; }, 50);
    }
}

function updateIssueLabel() {
    if (!magazinePages || !issueLabel) return;
    const pages = magazinePages.querySelectorAll('.magazine-page');
    const center = magazinePages.scrollLeft + magazinePages.clientWidth / 2;
    let closest = null;
    let minDist = Infinity;

    pages.forEach(p => {
        const pageCenter = p.offsetLeft + p.offsetWidth / 2;
        const dist = Math.abs(pageCenter - center);
        if (dist < minDist) { minDist = dist; closest = p; }
    });

    if (closest && closest.dataset.issue) {
        issueLabel.textContent = closest.dataset.issue;
    }
}

function scrollMagazine(direction) {
    if (!magazinePages) return;
    const page = magazinePages.querySelector('.magazine-page');
    if (!page) return;
    const pageWidth = page.offsetWidth + 32;
    magazinePages.scrollBy({
        left: direction * pageWidth,
        behavior: 'smooth'
    });
}

if (magazinePages) {
    magazinePages.addEventListener('scroll', () => {
        handleInfiniteScroll();
        updateIssueLabel();
    });
}
window.addEventListener('load', () => {
    setupInfiniteCarousel();
    updateIssueLabel();
});
if (prevBtn) prevBtn.addEventListener('click', () => scrollMagazine(-1));
if (nextBtn) nextBtn.addEventListener('click', () => scrollMagazine(1));
    </script>
</body>
</html>
